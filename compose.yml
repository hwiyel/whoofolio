services:
  app:
    build:
      context: .
      dockerfile: dockerfile
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    depends_on:
      - db

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: whoofolio
      POSTGRES_USER: whoofolio
      POSTGRES_PASSWORD: whoofolio
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
